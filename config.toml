# Global options
baseurl = "https://babyvlm.github.io/"
canonifyurls = true
theme = ["babyvlm-theme"]
disableKinds = ["taxonomy", "term"]

# Params that are used in <head>
[params]
  supertitle = "The BabyVLM Workshop"
  title = "<b>BabyVLM</b>: Toward Developmentally <br> Plausible Multimodal Systems"
  subtitle = "NeurIPS 2026"
  author = "BabyVLM Organizers"
  description = "The BabyVLM Workshop — toward developmentally plausible, sample-efficient multimodal systems (NeurIPS 2026)."
  keywords = ["workshop", "BabyVLM", "BabyLM", "vision language models", "multimodal", "sample-efficient", "developmental", "NeurIPS 2026"]
  logo = "/logo.png"  # BabyLM "pacifier" logo, ported from https://babylm.github.io/

# Options for Markdown renderer
[markup.goldmark.renderer]
  unsafe = true
  xHTML = true

# Main menu
[[menu.main]]
    name = "About"
    url  = "/"
    weight = 1
[[menu.main]]
    name = "Call for Papers"
    url  = "/call-for-papers"
    weight = 2
[[menu.main]]
    name = "BabyVLM Challenge"
    url  = "/challenge"
    weight = 3
[[menu.main]]
    name = "Schedule"
    url  = "/schedule"
    weight = 4
[[menu.main]]
    name = "Speakers"
    url  = "/speakers"
    weight = 5
[[menu.main]]
    name = "Organizers"
    url  = "/organizers"
    weight = 6
